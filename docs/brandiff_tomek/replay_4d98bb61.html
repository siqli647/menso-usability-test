const rp = new rrwebPlayer({
  target: document.getElementById("player"),
  props: {
    events,
    width: 1024,
    height: 640,
    showController: true,
    autoPlay: false,
    speed: 1,

/* Add click ripple on mouse clicks inside the replay */
rp.addEventListener("event-cast", (e) => {
  const ev = e.payload || e;
  if (!ev || !ev.type) return;
  /* type 3 = IncrementalSnapshot, source 2 = MouseInteraction, type 2 = Click */
  if (ev.type === 3 && ev.data && ev.data.source === 2 && ev.data.type === 2) {
    const wrapper = document.querySelector(".replayer-wrapper");
    if (!wrapper) return;
    const ring = document.createElement("div");
    ring.className = "menso-click-ring";
    ring.style.left = ev.data.x + "px";
    ring.style.top = ev.data.y + "px";
    wrapper.appendChild(ring);
    setTimeout(() => ring.remove(), 500);
  }
});
